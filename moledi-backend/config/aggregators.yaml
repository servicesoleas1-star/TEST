# Configuration centralisée des agrégateurs de paiement
# Rechargeable à chaud sans redémarrage du serveur

primary: orangeMoney

aggregators:
  orangeMoney:
    enabled: true
    name: Orange Money Cameroun
    apiUrl: https://api.orange.cameroun.com/payment
    timeout: 10000
    retryAttempts: 3
    retryDelay: 2000
    healthCheckInterval: 300000
    description: "Agrégateur principal pour Cameroun"

  # V1+ : Ajouter d'autres agrégateurs ici
  # mtn:
  #   enabled: false
  #   name: MTN Mobile Money
  #   apiUrl: https://api.mtn.cm/payment
  #   timeout: 10000
  # orangeInternational:
  #   enabled: false
  #   name: Orange Money International
  #   apiUrl: https://api.orange.com/payment
  #   timeout: 10000

# Configuration failover
failover:
  enabled: true
  degradedStatusDuration: 300000 # 5 minutes
  alertOnFailure: true
  emailAlerts: true

# Configuration webhook
webhook:
  responseTimeout: 5000
  retryAttempts: 3
  retryDelay: 1000

# Configuration réconciliation
reconciliation:
  enabled: true
  cronSchedule: "0 2 * * *" # Quotidien à 2h du matin
  lookbackDays: 3
  alertThreshold: 0.01 # 1 centime d'écart déclenche une alerte