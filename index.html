<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <meta name="description" content="Moledi Event — de l'idée à l'événement, en un clic : billetterie, votes, cagnottes, crowdfunding, sponsoring et concours en Afrique francophone." />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <title>Moledi Event</title>
    <!-- Masque les éléments visuels du widget Google Translate (bannière du
         haut, icône, halo de survol) dès le tout premier paint -- inline et
         dans <head>, pas injecté par JS, pour qu'il n'y ait JAMAIS ne
         serait-ce qu'un flash visible de la barre Google, quel que soit le
         moment où le script Google se charge. Voir services/googleTranslateService.js. -->
    <style>
      /* Google renomme régulièrement les classes de son widget (ex.
         .goog-te-banner-frame a été remplacée par des classes générées/
         obfusquées type "VIpgJd-ZVi9od-ORHb-OEVmcd" selon les déploiements
         Google) -- cibler iframe.skiptranslate est plus robuste : TOUT
         iframe créé par le widget (bannière du haut, bulle de traduction,
         tooltip...) porte cette classe stable, quel que soit le nom obfusqué
         qui l'accompagne. */
      iframe.skiptranslate { display: none !important; visibility: hidden !important; height: 0 !important; }
      .goog-te-banner-frame.skiptranslate { display: none !important; }
      body { top: 0 !important; position: static !important; display: block !important; min-height: 100vh !important; }
      html { display: block !important; }
      .goog-te-gadget-icon, .goog-te-menu-value, #goog-gt-tt, .goog-te-balloon-frame { display: none !important; }
      .goog-text-highlight { background: none !important; box-shadow: none !important; }
      #google_translate_element { display: none !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
